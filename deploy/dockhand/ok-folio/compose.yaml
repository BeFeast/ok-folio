name: ok-folio

services:
  postgres:
    image: ghcr.io/tensorchord/vchord-postgres:pg18-v1.1.1
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:?POSTGRES_ADMIN_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?POSTGRES_ADMIN_PASSWORD is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      PGDATA: /var/lib/postgresql/18/docker
    command:
      - postgres
      - -c
      - shared_preload_libraries=vchord,vector
      - -c
      - full_page_writes=off
      - -c
      - wal_init_zero=off
      - -c
      - wal_recycle=off
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-512MB}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-2GB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "${OK_FOLIO_POSTGRES_PORT:?OK_FOLIO_POSTGRES_PORT is required}:5432"
    volumes:
      - ${OK_FOLIO_PGDATA_HOST_PATH:?OK_FOLIO_PGDATA_HOST_PATH is required}:/var/lib/postgresql/18/docker
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - ok-folio-private

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command:
      - valkey-server
      - /usr/local/etc/valkey/valkey.conf
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:?VALKEY_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${VALKEY_PASSWORD}\" valkey-cli ping | grep -qx PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - "${OK_FOLIO_VALKEY_PORT:?OK_FOLIO_VALKEY_PORT is required}:6379"
    volumes:
      - ${OK_FOLIO_VALKEY_HOST_PATH:?OK_FOLIO_VALKEY_HOST_PATH is required}:/data
      - ${OK_FOLIO_VALKEY_CONFIG_HOST_PATH:?OK_FOLIO_VALKEY_CONFIG_HOST_PATH is required}:/usr/local/etc/valkey/valkey.conf:ro
    networks:
      - ok-folio-private

  embedder:
    image: ${OK_FOLIO_IMAGE_REGISTRY:?OK_FOLIO_IMAGE_REGISTRY is required}/ok-folio-embedder:${OK_FOLIO_IMAGE_EMBEDDER_SHA:?OK_FOLIO_IMAGE_EMBEDDER_SHA is required}
    restart: unless-stopped
    networks:
      - ok-folio-private

  app:
    image: ${OK_FOLIO_IMAGE_REGISTRY:?OK_FOLIO_IMAGE_REGISTRY is required}/ok-folio:${OK_FOLIO_IMAGE_SHA:?OK_FOLIO_IMAGE_SHA is required}
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      embedder:
        condition: service_started
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      # The app's config loader reads CACHE_* (internal/config/config.go), so the
      # Valkey connection settings must be fed under CACHE_* keys. The .env still
      # uses VALKEY_* (shared with the valkey service, healthcheck, and conf).
      CACHE_HOST: ${VALKEY_HOST:-valkey}
      CACHE_PORT: ${VALKEY_PORT:-6379}
      CACHE_PASSWORD: ${VALKEY_PASSWORD:?VALKEY_PASSWORD is required}
      # Legacy DB access is NOT part of normal app boot. LEGACY_DB_HOST is
      # optional and consumed only by the boot guard (internal/testguard) as an
      # extra host name to refuse if DB_HOST is ever misconfigured to point at
      # the legacy MariaDB/MySQL host; the guard already blocks the well-known
      # legacy hosts without it. Legacy dump credentials (LEGACY_DB_USER /
      # LEGACY_DB_PASSWORD) belong to the one-off ETL/admin path documented in
      # docs/legacy-etl-runbook.md and are never required by the normal app.
      LEGACY_DB_HOST: ${LEGACY_DB_HOST:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_USERNAME: ${TELEGRAM_USERNAME:?TELEGRAM_USERNAME is required}
      OK_FOLIO_DERIVATIVES_DIR: /derivatives
      OK_FOLIO_SIMILARITY_SIDECAR_URL: ${OK_FOLIO_SIMILARITY_SIDECAR_URL:-http://embedder:8081}
      OK_FOLIO_SIMILARITY_BACKFILL: ${OK_FOLIO_SIMILARITY_BACKFILL:-false}
    ports:
      - "${OK_FOLIO_APP_PORT:?OK_FOLIO_APP_PORT is required}:8080"
    volumes:
      - ${OK_FOLIO_CONFIG_HOST_PATH:?OK_FOLIO_CONFIG_HOST_PATH is required}:/config/config.yaml:ro
      - ${OK_FOLIO_DERIVATIVES_HOST_PATH:?OK_FOLIO_DERIVATIVES_HOST_PATH is required}:/derivatives
      - ${PHOTO_ORIGINALS_HOST_PATH:?PHOTO_ORIGINALS_HOST_PATH is required}:/photoprism/originals
      - ${PHOTO_DAILY_HOST_PATH:?PHOTO_DAILY_HOST_PATH is required}:/photoprism/_daily
      - ${PHOTOPRISM_STORAGE_HOST_PATH:?PHOTOPRISM_STORAGE_HOST_PATH is required}:/photoprism/storage:ro
    networks:
      - ok-folio-private
      - ok-folio-egress

networks:
  # Internal stack network: Postgres, Valkey, and the embedder never need egress
  # and stay isolated here with the app. No published ports leave this network.
  ok-folio-private:
    internal: true
  # Owned egress network for the app's outbound provider traffic (sight.photo,
  # Telegram). This replaces the previous dependency on the external legacy
  # Docker network; the normal runtime no longer joins any legacy network.
  ok-folio-egress:
    driver: bridge
